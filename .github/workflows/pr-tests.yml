name: PR Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.dotnet-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet-version:
          - 8.0.x
          - 9.0.x
          - 10.0.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore
        run: dotnet restore ADOLogger.slnx

      - name: Build
        run: dotnet build ADOLogger.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/ADOLogger.Tests/ADOLogger.Tests.csproj --configuration Release --no-build --verbosity normal
